<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Outer bezel gradient - gun metal -->
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a6e73"/>
      <stop offset="15%" stop-color="#555960"/>
      <stop offset="50%" stop-color="#3a3d42"/>
      <stop offset="85%" stop-color="#484c52"/>
      <stop offset="100%" stop-color="#2a2d31"/>
    </linearGradient>
    <!-- Inner screen gradient -->
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000f00"/>
      <stop offset="100%" stop-color="#000f00"/>
    </linearGradient>
    <!-- Dot pattern - dim background -->
    <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="4.5" fill="#ffffff" opacity="0.12"/>
    </pattern>
    <!-- Dot pattern - bright for letter -->
    <pattern id="brightdots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="4.5" fill="#55ff55" opacity="1"/>
    </pattern>
    <!-- Dot pattern - glow around letter -->
    <pattern id="glowdots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="4.5" fill="#44ff44" opacity="0.95"/>
    </pattern>
    <!-- Glow behind letter -->
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#33ff33" stop-opacity="0.2"/>
      <stop offset="30%" stop-color="#33ff33" stop-opacity="0.12"/>
      <stop offset="55%" stop-color="#33ff33" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#33ff33" stop-opacity="0"/>
    </radialGradient>
    <!-- Glossy highlight -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Blur for glow around shapes -->
    <filter id="cblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="ledblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <!-- Mask: sharp C shape (expanded by ~half dot to include edge dots) -->
    <mask id="cmask-sharp">
      <path transform="translate(87.2 410) scale(0.56 -0.56)" fill="white" stroke="white" stroke-width="14" stroke-linejoin="round" d="M304 -10Q238 -10 188.5 15.0Q139 40 112.0 87.5Q85 135 85 200V350Q85 416 112.0 463.0Q139 510 188.5 535.0Q238 560 304 560Q399 560 457.0 509.0Q515 458 518 370H428Q425 423 392.5 451.5Q360 480 304 480Q245 480 210.0 446.5Q175 413 175 351V200Q175 138 210.0 104.0Q245 70 304 70Q360 70 392.5 99.0Q425 128 428 180H518Q515 92 457.0 41.0Q399 -10 304 -10Z"/>
    </mask>
    <!-- Mask: blurred C for glow -->
    <mask id="cmask-glow">
      <path transform="translate(87.2 410) scale(0.56 -0.56)" fill="white" stroke="white" stroke-width="14" stroke-linejoin="round" filter="url(#cblur)" d="M304 -10Q238 -10 188.5 15.0Q139 40 112.0 87.5Q85 135 85 200V350Q85 416 112.0 463.0Q139 510 188.5 535.0Q238 560 304 560Q399 560 457.0 509.0Q515 458 518 370H428Q425 423 392.5 451.5Q360 480 304 480Q245 480 210.0 446.5Q175 413 175 351V200Q175 138 210.0 104.0Q245 70 304 70Q360 70 392.5 99.0Q425 128 428 180H518Q515 92 457.0 41.0Q399 -10 304 -10Z"/>
    </mask>
    <!-- Mask: sharp cursor block -->
    <mask id="cursormask-sharp">
      <rect x="401" y="73" width="12" height="366" fill="white"/>
    </mask>
    <!-- Mask: blurred cursor for glow -->
    <mask id="cursormask-glow">
      <rect x="401" y="73" width="12" height="366" fill="white" filter="url(#ledblur)"/>
    </mask>
  </defs>

  <!-- Bezel -->
  <rect width="512" height="512" rx="100" fill="url(#bezel)"/>
  <!-- Dark inner border -->
  <rect x="18" y="18" width="476" height="476" rx="82" fill="#111"/>
  <!-- Screen -->
  <rect x="28" y="28" width="456" height="456" rx="72" fill="url(#screen)"/>
  <!-- Dot grid - dim background dots -->
  <rect x="28" y="28" width="456" height="456" rx="72" fill="url(#dots)"/>
  <!-- Dots glowing near the C -->
  <rect x="28" y="28" width="456" height="456" rx="72" fill="url(#glowdots)" mask="url(#cmask-glow)"/>
  <!-- Dots glowing near the cursor -->
  <rect x="28" y="28" width="456" height="456" rx="72" fill="url(#glowdots)" mask="url(#cursormask-glow)"/>
  <!-- Glow -->
  <circle cx="256" cy="256" r="150" fill="url(#glow)"/>
  <!-- Cursor glow halo -->
  <rect x="396" y="68" width="22" height="376" rx="4" fill="#33ff33" opacity="0.35" filter="url(#ledblur)"/>
  <!-- Bright dots forming the C -->
  <rect x="28" y="28" width="456" height="456" rx="72" fill="url(#brightdots)" mask="url(#cmask-sharp)"/>
  <!-- Bright dots forming the cursor -->
  <rect x="28" y="28" width="456" height="456" rx="72" fill="url(#brightdots)" mask="url(#cursormask-sharp)"/>
  <!-- Gloss -->
  <path d="M28,100 A72,72 0 0,1 100,28 L412,28 A72,72 0 0,1 484,100 L484,280 Q256,355 28,280 Z" fill="url(#gloss)"/>
</svg>
